# Replaces the image's /etc/nginx/conf.d/default.conf. Serves the Vite build as
# a single-page app (matching the Cloudflare `single-page-application` behavior).
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Runtime config + entry HTML must never be cached — config.js is generated
    # per container start and index.html references hashed asset filenames.
    # (No `expires` directive here: it would emit a second, conflicting
    # Cache-Control: no-cache header alongside this explicit one.)
    location = /config.js {
        add_header Cache-Control "no-store, must-revalidate" always;
    }
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    # Vite emits content-hashed files under /assets/ — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths (client-side routes) serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
