# PUBLISHED image (release): pull and run the GHCR image — NO local build.
# Use this to run a released artifact (e.g. on a server, or to test a release).
#   docker compose -f docker/docker-compose.ghcr.yml up -d --pull always
# or the wrapper: docker/start-published.sh   (optionally: TAG=v1.2.3 docker/start-published.sh)
#
# To build & run from your working tree instead, use docker-compose.yml.
services:
  web:
    image: ghcr.io/intranetfactory/semantius-web:${TAG:-latest}
    container_name: semantius-web
    # Single exposed endpoint (Caddy). For auto-HTTPS, set SITE_ADDRESS to a
    # domain in docker/.env and also publish 443 (- "443:443"). To proxy /api and
    # /api-docs, add sibling services on the same network (see docker-compose.yml).
    ports:
      - "${WEB_PORT:-7070}:80"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
