<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/semantius-logo-square.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantius</title>
    <style>
      /* Initial loading spinner — hidden once the app signals readiness */
      #app-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: white;
      }
      #app-loader[hidden] {
        display: none;
      }
      .app-loader-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        color: #888;
        font-family: system-ui, sans-serif;
        font-size: 0.875rem;
      }
      .app-loader-spinner {
        width: 2rem;
        height: 2rem;
        border: 2px solid #e5e5e5;
        border-top-color: #888;
        border-radius: 50%;
        animation: app-spin 0.6s linear infinite;
      }
      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="app-loader-inner">
        <div class="app-loader-spinner"></div>
        <span>Loading…</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
