<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad)" rx="64"/>
  
  <!-- Database representation -->
  <g transform="translate(256,256)">
    <!-- Top cylinder -->
    <ellipse cx="0" cy="-80" rx="140" ry="40" fill="#ffffff" opacity="0.95"/>
    
    <!-- Middle section with data rows -->
    <rect x="-140" y="-80" width="280" height="100" fill="#ffffff" opacity="0.95"/>
    <line x1="-120" y1="-50" x2="120" y2="-50" stroke="#2563eb" stroke-width="6" opacity="0.7"/>
    <line x1="-120" y1="-20" x2="120" y2="-20" stroke="#2563eb" stroke-width="6" opacity="0.7"/>
    <line x1="-120" y1="10" x2="120" y2="10" stroke="#2563eb" stroke-width="6" opacity="0.7"/>
    
    <!-- Bottom cylinder -->
    <ellipse cx="0" cy="20" rx="140" ry="40" fill="#ffffff" opacity="0.95"/>
    
    <!-- Letter S overlay -->
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="160" font-weight="bold" 
          fill="#2563eb" text-anchor="middle" dominant-baseline="middle">S</text>
  </g>
</svg>
